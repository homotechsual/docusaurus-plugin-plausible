name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'yarn'

      - run: corepack enable

      - run: npm install -g npm@latest

      - run: yarn install --immutable

      - run: yarn build

      - run: npm publish --access public
